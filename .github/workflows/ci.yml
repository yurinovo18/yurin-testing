name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  id-token: write       # required for JFrog OIDC + signing
  contents: read
  attestations: write   # required by actions/attest-build-provenance
  actions: write        # detected by attest action for the GHA env
  packages: write       # for uploading attestations.


env:
  IMAGE_NAME: calc

jobs:
  ci:
    name: test, build, push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - uses: docker/setup-buildx-action@v3

      - name: Install and Configure JFrog CLI
        id: setup-jfrog
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: https://${{ vars.JF_URL }}
        with:
          oidc-provider-name: yurinovo18/yurin-testing@github
          version: latest

      - name: Ping Artifactory
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: jf rt ping

      - name: Log in to JFrog Docker Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.JF_URL }}
          username: ${{ steps.setup-jfrog.outputs.oidc-user }}
          password: ${{ steps.setup-jfrog.outputs.oidc-token }}

      - name: Build and Push Docker Image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ vars.JF_URL }}/${{ vars.JF_DOCKER_REPO }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}

      - name: Attest Docker Image and Send to JFrog Evidence
        uses: actions/attest-build-provenance@v3
        with:
          # The 'oci://' prefix is required by JFrog to correctly parse the artifact type
          subject-name: oci://${{ env.JF_URL }}/${{ env.JF_DOCKER_REPO }}/${{ env.IMAGE_NAME }}

          # This links the attestation directly to the image digest from the build step
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
