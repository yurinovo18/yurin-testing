name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  id-token: write   # required for JFrog OIDC
  contents: read

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

  docker:
    name: build, smoke-test, push
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: calc:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test image
        run: |
          set -euo pipefail
          [ "$(docker run --rm calc:ci '2 + 3 * 4')" = "14" ]
          [ "$(docker run --rm calc:ci '(1 + 2) ** 3')" = "27" ]
          if docker run --rm calc:ci '1 / 0'; then
            echo "expected non-zero exit on divide-by-zero" >&2
            exit 1
          fi

      - name: Report image size
        run: docker images calc:ci --format '{{.Repository}}:{{.Tag}} {{.Size}}'

      # --- Push to JFrog Artifactory (push-to-main only) ---

      - name: Setup JFrog CLI
        id: setup-jfrog
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ vars.JF_URL }}
        with:
          oidc-provider-name: yurinovo18/yurin-testing@github

      - name: Ping Artifactory
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: jf rt ping

      - name: Docker login to JFrog
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          REGISTRY="$(echo '${{ vars.JF_URL }}' | sed -E 's#^https?://##')"
          echo '${{ steps.setup-jfrog.outputs.oidc-token }}' | \
            docker login "$REGISTRY" \
              -u '${{ steps.setup-jfrog.outputs.oidc-user }}' \
              --password-stdin

      - name: Tag and push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          BUILD_NAME: calc
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          REGISTRY="$(echo '${{ vars.JF_URL }}' | sed -E 's#^https?://##')"
          IMAGE="${REGISTRY}/${{ vars.JF_DOCKER_REPO }}/calc"
          SHA_TAG="${IMAGE}:${{ github.sha }}"
          BUILD_TAG="${IMAGE}:${BUILD_NUMBER}"

          docker tag calc:ci "$SHA_TAG"
          docker tag calc:ci "$BUILD_TAG"

          jf docker push "$SHA_TAG" \
            --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"
          jf docker push "$BUILD_TAG" \
            --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"

          jf rt build-collect-env "$BUILD_NAME" "$BUILD_NUMBER"
          jf rt build-add-git "$BUILD_NAME" "$BUILD_NUMBER"
          jf rt build-publish "$BUILD_NAME" "$BUILD_NUMBER"
